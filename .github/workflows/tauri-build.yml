name: Tauri Desktop Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install LLVM and CMake
        shell: pwsh
        run: |
          choco install llvm cmake -y --no-progress
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "C:\Program Files\CMake\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        shell: pwsh
        run: .\scripts\tauri-release.ps1 -TargetDir "$env:RUNNER_TEMP\candor-target" -Ci
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin

      - name: Smoke test Windows installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $bundleRoot = Join-Path $env:RUNNER_TEMP "candor-target\release\bundle"
          $installer = Get-ChildItem -LiteralPath $bundleRoot -Recurse -File -Filter "*_x64-setup.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "NSIS installer was not produced."
          }

          $msi = Get-ChildItem -LiteralPath $bundleRoot -Recurse -File -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) {
            throw "MSI installer was not produced."
          }

          $installDir = Join-Path $env:RUNNER_TEMP "candor-smoke-install"
          $profileRoot = Join-Path $env:RUNNER_TEMP "candor-smoke-profile"
          $appData = Join-Path $profileRoot "AppData"
          $localAppData = Join-Path $profileRoot "LocalAppData"
          $tempDir = Join-Path $profileRoot "Temp"
          New-Item -ItemType Directory -Force -Path $installDir,$appData,$localAppData,$tempDir | Out-Null

          $install = Start-Process -FilePath $installer.FullName -ArgumentList @("/S", "/D=$installDir") -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "NSIS installer failed with exit code $($install.ExitCode)."
          }

          $exe = Join-Path $installDir "Candor.exe"
          if (-not (Test-Path -LiteralPath $exe)) {
            throw "Installed Candor.exe was not found."
          }

          $processInfo = [System.Diagnostics.ProcessStartInfo]::new()
          $processInfo.FileName = $exe
          $processInfo.WorkingDirectory = $installDir
          $processInfo.Environment["APPDATA"] = $appData
          $processInfo.Environment["LOCALAPPDATA"] = $localAppData
          $processInfo.Environment["TEMP"] = $tempDir
          $processInfo.Environment["TMP"] = $tempDir

          $appProcess = [System.Diagnostics.Process]::Start($processInfo)
          Start-Sleep -Seconds 15
          if ($appProcess.HasExited) {
            throw "Candor.exe exited during smoke test with code $($appProcess.ExitCode)."
          }

          $tcpConnections = @(Get-NetTCPConnection -OwningProcess $appProcess.Id -ErrorAction SilentlyContinue)
          if ($tcpConnections.Count -gt 0) {
            throw "Candor.exe opened $($tcpConnections.Count) TCP listener or connection during smoke test."
          }

          Stop-Process -Id $appProcess.Id -Force -ErrorAction SilentlyContinue

          $uninstaller = Get-ChildItem -LiteralPath $installDir -File -Filter "uninstall*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $uninstaller) {
            throw "NSIS uninstaller was not found."
          }

          $uninstall = Start-Process -FilePath $uninstaller.FullName -ArgumentList "/S" -Wait -PassThru
          if ($uninstall.ExitCode -ne 0) {
            throw "NSIS uninstaller failed with exit code $($uninstall.ExitCode)."
          }

          Start-Sleep -Seconds 2
          if (Test-Path -LiteralPath $installDir) {
            throw "NSIS uninstall left the install directory behind."
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "candor-msi-extract"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          $msiExtract = Start-Process -FilePath "msiexec.exe" -ArgumentList @("/a", $msi.FullName, "/qn", "TARGETDIR=$extractDir") -Wait -PassThru
          if ($msiExtract.ExitCode -ne 0) {
            throw "MSI administrative extraction failed with exit code $($msiExtract.ExitCode)."
          }

          $extractedExe = Get-ChildItem -LiteralPath $extractDir -Recurse -File -Filter "Candor.exe" | Select-Object -First 1
          if (-not $extractedExe) {
            throw "MSI extraction did not contain Candor.exe."
          }

      - name: Build Microsoft Store candidate
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: .\scripts\tauri-release.ps1 -Store -TargetDir "$env:RUNNER_TEMP\candor-store-target" -Ci
        env:
          LIBCLANG_PATH: C:\Program Files\LLVM\bin

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          name: candor-windows-${{ github.sha }}
          path: |
            ${{ runner.temp }}\candor-target\release\bundle/**/*.exe
            ${{ runner.temp }}\candor-target\release\bundle/**/*.msi
            ${{ runner.temp }}\candor-store-target\release\bundle/**/*.exe
            ${{ runner.temp }}\candor-store-target\release\bundle/**/*.msi
          if-no-files-found: warn
          retention-days: 14
